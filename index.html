<!-- index.html -->
<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เช็คชื่อบนรถทัวร์</title>
  <style>
    * { box-sizing: border-box; font-family: 'Sarabun', sans-serif; }
    body { background: #f0f4ff; display: flex; justify-content: center;
           align-items: center; min-height: 100vh; margin: 0; }
    .card { background: white; padding: 2rem; border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 360px; }
    h2 { text-align: center; color: #2c3e50; }
    .toggle { display: flex; margin-bottom: 1.5rem; border-radius: 8px; overflow: hidden; border: 2px solid #3498db; }
    .toggle button { flex: 1; padding: 0.6rem; border: none; cursor: pointer;
                     background: white; font-size: 1rem; transition: 0.3s; }
    .toggle button.active { background: #3498db; color: white; }
    input, select { width: 100%; padding: 0.7rem; margin-bottom: 1rem;
                    border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
    .btn { width: 100%; padding: 0.8rem; background: #2ecc71; color: white;
           border: none; border-radius: 8px; font-size: 1.1rem; cursor: pointer; }
    .gps-note { font-size: 0.85rem; color: #e74c3c; text-align: center; margin-bottom: 1rem; }
  </style>
</head>
<body>
<div class="card">
  <h2>🚌 เช็คชื่อบนรถทัวร์</h2>
  <div class="toggle">
    <button id="btnStudent" class="active" onclick="switchMode('student')">👨‍🎓 นักเรียน</button>
    <button id="btnTeacher" onclick="switchMode('teacher')">👩‍🏫 ครู</button>
  </div>

  <!-- ฟอร์มนักเรียน -->
  <div id="formStudent">
    <input type="text" id="s_name" placeholder="ชื่อ-นามสกุล">
    <input type="text" id="s_class" placeholder="ห้องเรียน เช่น ม.3/2">
    <input type="number" id="s_number" placeholder="เลขที่">
    <p class="gps-note">⚠️ กรุณาเปิด GPS บนมือถือก่อนกด Login</p>
    <button class="btn" onclick="loginStudent()">เข้าสู่ระบบ</button>
  </div>

  <!-- ฟอร์มครู -->
  <div id="formTeacher" style="display:none">
    <input type="text" id="t_name" placeholder="ชื่อ-นามสกุลครู">
    <input type="text" id="t_class" placeholder="ห้องที่รับผิดชอบ">
    <p class="gps-note">⚠️ กรุณาเปิด GPS บนมือถือก่อนกด Login</p>
    <button class="btn" onclick="loginTeacher()">เข้าสู่ระบบ</button>
  </div>
</div>

<script>
function switchMode(mode) {
  document.getElementById('formStudent').style.display = mode === 'student' ? 'block' : 'none';
  document.getElementById('formTeacher').style.display = mode === 'teacher' ? 'block' : 'none';
  document.getElementById('btnStudent').className = mode === 'student' ? 'active' : '';
  document.getElementById('btnTeacher').className = mode === 'teacher' ? 'active' : '';
}

async function getGPS() {
  return new Promise((resolve, reject) => {
    navigator.geolocation.getCurrentPosition(
      pos => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
      err => reject("ไม่สามารถอ่าน GPS ได้ กรุณาเปิด GPS")
    );
  });
}

async function loginStudent() {
  const name = document.getElementById('s_name').value.trim();
  const cls = document.getElementById('s_class').value.trim();
  const num = document.getElementById('s_number').value.trim();
  if (!name || !cls || !num) return alert("กรุณากรอกข้อมูลให้ครบ");
  try {
    const gps = await getGPS();
    const today = new Date().toISOString().split('T')[0];
    const data = { name, class: cls, number: parseInt(num), role: 'student',
                   lat: gps.lat, lng: gps.lng, date: today,
                   loginTime: new Date().toLocaleString('th-TH') };
    localStorage.setItem('userData', JSON.stringify(data));
    // ส่งข้อมูลไป server
    await fetch('/api/login', { method: 'POST',
      headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
    window.location.href = 'student.html';
  } catch(e) { alert(e); }
}

async function loginTeacher() {
  const name = document.getElementById('t_name').value.trim();
  const cls = document.getElementById('t_class').value.trim();
  if (!name || !cls) return alert("กรุณากรอกข้อมูลให้ครบ");
  try {
    const gps = await getGPS();
    const today = new Date().toISOString().split('T')[0];
    const data = { name, class: cls, role: 'teacher',
                   lat: gps.lat, lng: gps.lng, date: today };
    localStorage.setItem('userData', JSON.stringify(data));
    await fetch('/api/login', { method: 'POST',
      headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
    window.location.href = 'teacher.html';
  } catch(e) { alert(e); }
}
</script>
</body>
</html>
