<!-- teacher.html -->
<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>หน้าครู</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
  <style>
    body { font-family: 'Sarabun', sans-serif; margin: 0; background: #f0f4ff; }
    .header { background: #2c3e50; color: white; padding: 1rem; text-align: center; }
    .tab-bar { display: flex; background: white; border-bottom: 2px solid #ddd; }
    .tab { flex: 1; padding: 0.8rem; text-align: center; cursor: pointer; border: none;
           background: none; font-size: 1rem; }
    .tab.active { border-bottom: 3px solid #3498db; color: #3498db; font-weight: bold; }
    .page { display: none; padding: 1rem; }
    .page.active { display: block; }

    /* ตั้งค่ารถ */
    .bus-canvas { border: 2px dashed #3498db; border-radius: 8px; position: relative;
                  background: #eaf4ff; margin: 1rem 0; overflow: hidden; }
    .device-dot { width: 20px; height: 20px; background: red; border-radius: 50%;
                  position: absolute; cursor: grab; transform: translate(-50%, -50%); }

    /* รายชื่อ */
    .student-row { display: flex; justify-content: space-between; align-items: center;
                   background: white; border-radius: 8px; padding: 0.8rem 1rem;
                   margin-bottom: 0.5rem; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .badge { padding: 0.3rem 0.7rem; border-radius: 20px; font-size: 0.85rem; color: white; }
    .on { background: #2ecc71; }
    .off { background: #e74c3c; }

    #map { height: 400px; border-radius: 12px; }
    input[type=number] { width: 80px; padding: 0.4rem; border: 1px solid #ddd; border-radius: 6px; }
  </style>
</head>
<body>

<div class="header">
  <h2>🚌 ระบบเช็คชื่อบนรถทัวร์ — ครู</h2>
</div>

<div class="tab-bar">
  <button class="tab active" onclick="showTab('setup')">⚙️ ตั้งค่ารถ</button>
  <button class="tab" onclick="showTab('map')">🗺️ แผนที่</button>
  <button class="tab" onclick="showTab('list')">📋 รายชื่อ</button>
</div>

<!-- TAB: ตั้งค่ารถ -->
<div id="tab-setup" class="page active">
  <h3>ระบุขนาดรถและตำแหน่งอุปกรณ์</h3>
  <label>ความกว้าง (เมตร): <input type="number" id="busWidth" value="2.5" step="0.1"></label><br><br>
  <label>ความยาว (เมตร): <input type="number" id="busLength" value="12" step="0.1"></label><br><br>
  <button onclick="drawBus()" style="padding:0.5rem 1rem;background:#3498db;color:white;border:none;border-radius:8px;cursor:pointer;">
    วาดรูปรถ
  </button>

  <div id="busCanvas" class="bus-canvas" style="width:100%;height:300px;display:none;">
    <div class="device-dot" id="deviceDot" style="left:50%;top:20%;"></div>
    <div style="position:absolute;bottom:4px;right:8px;font-size:0.75rem;color:#999;">
      ลากจุดแดงเพื่อตั้งตำแหน่งอุปกรณ์
    </div>
  </div>

  <button onclick="saveSetup()" style="margin-top:1rem;padding:0.7rem 1.5rem;
    background:#2ecc71;color:white;border:none;border-radius:8px;cursor:pointer;font-size:1rem;">
    ✅ บันทึกและถัดไป
  </button>
  <button onclick="showTab('setup')" style="margin-top:0.5rem;padding:0.5rem 1rem;
    background:#95a5a6;color:white;border:none;border-radius:8px;cursor:pointer;">
    ✏️ แก้ไขขนาดภายหลัง
  </button>
</div>

<!-- TAB: แผนที่ -->
<div id="tab-map" class="page">
  <h3>แผนที่ตำแหน่ง Real-Time</h3>
  <div id="map"></div>
</div>

<!-- TAB: รายชื่อ -->
<div id="tab-list" class="page">
  <h3>รายชื่อนักเรียน</h3>
  <div id="studentList"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const userData = JSON.parse(localStorage.getItem('userData'));
if (!userData || userData.role !== 'teacher') window.location.href = 'index.html';

let map, markers = {};

function showTab(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  event.target.classList.add('active');
  if (name === 'map' && !map) initMap();
}

function drawBus() {
  document.getElementById('busCanvas').style.display = 'block';
  makeDraggable(document.getElementById('deviceDot'));
}

function makeDraggable(el) {
  let dragging = false, ox, oy;
  el.addEventListener('mousedown', e => { dragging = true; ox = e.offsetX; oy = e.offsetY; });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const rect = el.parentElement.getBoundingClientRect();
    el.style.left = (e.clientX - rect.left) + 'px';
    el.style.top = (e.clientY - rect.top) + 'px';
  });
  document.addEventListener('mouseup', () => dragging = false);
  // Touch support
  el.addEventListener('touchmove', e => {
    const t = e.touches[0];
    const rect = el.parentElement.getBoundingClientRect();
    el.style.left = (t.clientX - rect.left) + 'px';
    el.style.top = (t.clientY - rect.top) + 'px';
  });
}

function saveSetup() {
  const dot = document.getElementById('deviceDot');
  const canvas = document.getElementById('busCanvas');
  const setup = {
    width: document.getElementById('busWidth').value,
    length: document.getElementById('busLength').value,
    deviceX: parseFloat(dot.style.left) / canvas.offsetWidth,
    deviceY: parseFloat(dot.style.top) / canvas.offsetHeight
  };
  localStorage.setItem('busSetup', JSON.stringify(setup));
  fetch('/api/bus-setup', { method: 'POST',
    headers: {'Content-Type':'application/json'}, body: JSON.stringify(setup) });
  alert('บันทึกแล้ว!');
  showTab('map');
}

function initMap() {
  map = L.map('map').setView([13.7563, 100.5018], 15);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  updateMap();
  setInterval(updateMap, 10000);
}

async function updateMap() {
  const today = new Date().toISOString().split('T')[0];
  const res = await fetch(`/api/students?class=${userData.class}&date=${today}`);
  const students = await res.json();
  students.forEach(s => {
    if (markers[s.number]) {
      markers[s.number].setLatLng([s.lat, s.lng]);
    } else {
      markers[s.number] = L.marker([s.lat, s.lng])
        .addTo(map)
        .bindPopup(`เลขที่ ${s.number}: ${s.name}`);
    }
  });
  renderList(students);
}

function renderList(students) {
  students.sort((a, b) => a.number - b.number);
  const el = document.getElementById('studentList');
  el.innerHTML = students.map(s => `
    <div class="student-row">
      <span>เลขที่ ${s.number} — ${s.name}</span>
      <span class="badge ${s.onBus ? 'on' : 'off'}">${s.onBus ? 'บนรถ' : 'นอกรถ'}</span>
    </div>
  `).join('');
}
</script>
</body>
</html>
