<!-- student.html -->
<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>หน้านักเรียน</title>
  <style>
    body { font-family: 'Sarabun', sans-serif; background: #f0f4ff; margin: 0; padding: 1rem; }
    .status-box { text-align: center; padding: 2rem; border-radius: 16px;
                  font-size: 2rem; font-weight: bold; margin-bottom: 1.5rem; }
    .on-bus { background: #2ecc71; color: white; }
    .off-bus { background: #e74c3c; color: white; }
    .info-card { background: white; border-radius: 12px; padding: 1.2rem;
                 margin-bottom: 1rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    h3 { color: #2c3e50; margin-bottom: 0.5rem; }
    .log-item { border-bottom: 1px solid #eee; padding: 0.5rem 0; font-size: 0.95rem; }
  </style>
</head>
<body>

<div id="statusBox" class="status-box off-bus">📍 กำลังตรวจสอบ...</div>

<div class="info-card">
  <h3>ข้อมูลของฉัน</h3>
  <p id="studentInfo"></p>
</div>

<div class="info-card">
  <h3>📋 ประวัติการขึ้นรถทัวร์วันนี้</h3>
  <div id="logList"></div>
</div>

<script>
const userData = JSON.parse(localStorage.getItem('userData'));
if (!userData || userData.role !== 'student') window.location.href = 'index.html';

document.getElementById('studentInfo').innerHTML =
  `${userData.name} | ห้อง ${userData.class} | เลขที่ ${userData.number}`;

let lastStatus = null;

async function updateStatus() {
  navigator.geolocation.getCurrentPosition(async pos => {
    const res = await fetch('/api/check-status', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        studentId: userData.number,
        class: userData.class,
        lat: pos.coords.latitude,
        lng: pos.coords.longitude,
        date: userData.date
      })
    });
    const data = await res.json();
    const box = document.getElementById('statusBox');
    if (data.onBus) {
      box.textContent = '🚌 อยู่บนรถ';
      box.className = 'status-box on-bus';
      if (lastStatus !== 'on') { addLog('ขึ้นรถ'); lastStatus = 'on'; }
    } else {
      box.textContent = '🚶 อยู่นอกรถ';
      box.className = 'status-box off-bus';
      if (lastStatus === 'on') { addLog('ลงรถ'); lastStatus = 'off'; }
    }
  });
}

function addLog(action) {
  const now = new Date().toLocaleString('th-TH');
  const div = document.createElement('div');
  div.className = 'log-item';
  div.textContent = `${action} — ${now}`;
  document.getElementById('logList').prepend(div);
  // ส่งบันทึกไป server ด้วย
  fetch('/api/log', { method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ ...userData, action, time: now }) });
}

updateStatus();
setInterval(updateStatus, 10000); // อัปเดตทุก 10 วินาที
</script>
</body>
</html>
